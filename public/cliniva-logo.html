<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cliniva - نظام إدارة العيادات</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .logo-wrapper {
      position: relative;
      width: 600px;
      height: 200px;
      margin: 0 auto 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: zoomIn 1s ease-out;
    }

    .logo-text {
      font-size: 100px;
      font-weight: 900;
      letter-spacing: -2px;
      display: flex;
      align-items: center;
      gap: 0;
      direction: ltr;
    }

    .logo-black {
      color: #1a1a1a;
      animation: slideInLeft 1s ease-out;
    }

    .logo-gold {
      color: #c9a961;
      animation: slideInRight 1s ease-out;
    }

    .subtitle {
      font-size: 28px;
      color: #333;
      margin-top: 40px;
      animation: fadeIn 2s ease-in 0.5s both;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 18px;
      color: #666;
      margin-top: 20px;
      animation: fadeIn 2.5s ease-in 1s both;
      letter-spacing: 0.5px;
      font-weight: 300;
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Animated background accent */
    .accent-line {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 0;
      height: 4px;
      background: linear-gradient(90deg, #c9a961, #1a1a1a);
      animation: expandLine 3s ease-in-out forwards;
      z-index: 1;
    }

    @keyframes expandLine {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="accent-line"></div>

  <div class="container">
    <div class="logo-wrapper">
      <div class="logo-text">
        <span class="logo-black">Clin</span><span class="logo-gold">va</span>
      </div>
    </div>
    <div class="subtitle">نظام إدارة العيادات الشامل</div>
    <div class="tagline">The Complete Clinic Management System</div>
  </div>
</body>
</html>
