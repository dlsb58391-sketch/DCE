<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cliniva - نظام إدارة العيادات</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #1a472a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .logo-wrapper {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-circle {
      position: absolute;
      width: 250px;
      height: 250px;
      border: 3px solid #00d4aa;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-text {
      font-size: 60px;
      font-weight: 700;
      color: #00d4aa;
      letter-spacing: 2px;
      animation: slideUp 1.5s ease-out;
      text-shadow: 0 0 20px rgba(0, 212, 170, 0.5);
    }

    .subtitle {
      font-size: 24px;
      color: #fff;
      margin-top: 30px;
      animation: fadeIn 2s ease-in 0.5s both;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 15px;
      animation: fadeIn 2.5s ease-in 1s both;
      letter-spacing: 0.5px;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Animated background particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 212, 170, 0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="logo-wrapper">
      <div class="logo-circle"></div>
      <div class="logo-text">كلينييفا</div>
    </div>
    <div class="subtitle">نظام إدارة العيادات الشامل</div>
    <div class="tagline">The Complete Clinic Management System</div>
  </div>

  <script>
    // Create animated particles
    const particlesContainer = document.getElementById('particles');
    
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
      particle.style.animationDelay = Math.random() * 2 + 's';
      particlesContainer.appendChild(particle);
    }
  </script>
</body>
</html>
